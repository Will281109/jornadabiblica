<div class="studies-screen-wrapper" style="padding: 16px 16px 80px 16px;">
    <div style="margin-bottom: 20px;">
        <h2 style="font-size: 1.4rem; font-weight: 800; margin: 0; color: var(--text-main);">Academia Bíblica</h2>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin: 4px 0 0 0;">Aprofunde seus conhecimentos e marque seus estudos concluídos.</p>
    </div>

    <div class="studies-tabs" style="display: flex; background: var(--v2-bg-deep); padding: 4px; border-radius: 14px; margin-bottom: 16px; border: 1px solid var(--border-subtle);">
        <button id="tab-available-studies" class="tab-btn active" style="flex: 1; padding: 10px; border: none; background: var(--v2-bg-surface); border-radius: 10px; color: var(--text-main); font-weight: 700; font-size: 0.85rem; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.05);">
            <i class="fa-solid fa-book-open"></i> Disponíveis
        </button>
        <button id="tab-completed-studies" class="tab-btn" style="flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; color: var(--text-muted); font-weight: 700; font-size: 0.85rem; cursor: pointer;">
            <i class="fa-solid fa-graduation-cap"></i> Concluídos
        </button>
    </div>

    <div id="studies-dynamic-container" style="display: flex; flex-direction: column; gap: 12px;"></div>
</div>

<div id="study-reader-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--v2-bg-deep); z-index: 2000; display: flex; flex-direction: column;">
    <div style="padding: 16px; background: var(--v2-bg-surface); border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center;">
        <button id="btn-close-study" style="background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer;"><i class="fa-solid fa-arrow-left"></i></button>
        <h3 id="study-reader-title" style="margin: 0; font-size: 1rem; font-weight: 800; color: var(--text-main); text-align: center; flex: 1;">Carregando...</h3>
        <div style="width: 24px;"></div>
    </div>
    
    <div id="study-content-scroller" style="flex: 1; overflow-y: auto; padding: 20px; color: var(--text-main); line-height: 1.6;"></div>

    <div id="study-footer-actions" style="padding: 16px; background: var(--v2-bg-surface); border-top: 1px solid var(--border-subtle); display: flex; justify-content: center;">
        <button id="btn-finish-study-direct" class="btn-primary-action" style="width: 100%; max-width: 300px; background: #487E56; font-weight: 800; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 0.95rem;">
            Marcar como Estudo Concluído
        </button>
    </div>
</div>
