<h2 class="page-heading">Corações & Energia</h2>
<p style="color: var(--text-muted); font-size: 0.85rem; margin-top: -10px; margin-bottom: 25px;">Mantenha suas vidas cheias para continuar sua jornada sem interrupções.</p>

<div class="heart-status-container" style="background: var(--v2-bg-surface); border: 1px solid var(--border-subtle); padding: 24px; border-radius: 20px; text-align: center; margin-bottom: 24px;">
    <div style="font-size: 3.5rem; color: #D95D55; margin-bottom: 10px; animation: pulseIcon 1.5s infinite ease-in-out;">
        <i class="fa-solid fa-heart"></i>
    </div>
    <div style="font-size: 1.8rem; font-weight: 800; color: var(--text-main);" id="shop-lives-count">0 / 10</div>
    <p id="shop-lives-timer" style="font-size: 0.9rem; color: var(--text-muted); margin: 8px 0 0 0;">Carregando próximo coração...</p>
</div>

<h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 16px;">Recarga Rápida</h3>

<div class="shop-list" style="display: flex; flex-direction: column; gap: 12px;">
    <div class="shop-card" style="background: var(--v2-bg-surface); border: 1px solid var(--border-subtle); padding: 16px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; gap: 14px; align-items: center;">
            <div style="background: rgba(217, 93, 85, 0.1); color: #D95D55; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 1.1rem;">
                <i class="fa-solid fa-heart-circle-bolt"></i>
            </div>
            <div>
                <h4 style="font-size: 0.9rem; font-weight: 700; margin: 0;">Recarga Total (Máx 10)</h4>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin: 2px 0 0 0;">Recupere todos os corações instantaneamente.</p>
            </div>
        </div>
        <button class="buy-lives-btn" data-type="full" style="background: var(--v2-bg-deep); border: 1px solid var(--border-subtle); padding: 8px 12px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-main);">
            <i class="fa-solid fa-star" style="color: #D4A327;"></i> 50
        </button>
    </div>
</div>
