<div class="profile-screen-wrapper" style="padding: 16px 16px 80px 16px; text-align: center;">
    <div style="margin-bottom: 30px;">
        <div style="width: 100px; height: 100px; background: var(--gradient-primary); border-radius: 50%; margin: 0 auto 16px auto; display: flex; align-items: center; justify-content: center; border: 4px solid var(--v2-bg-surface); box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            <i class="fa-solid fa-user-astronaut" style="font-size: 3rem; color: white;"></i>
        </div>
        <h2 style="font-size: 1.4rem; font-weight: 800; margin: 0; color: var(--text-main);">Seu Perfil</h2>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin: 4px 0 0 0;">Gerencie sua jornada bíblica.</p>
    </div>

    <div style="background: var(--v2-bg-surface); border: 1px solid var(--border-subtle); border-radius: 20px; padding: 20px; margin-bottom: 20px;">
        <h3 style="font-size: 1rem; margin: 0 0 15px 0; color: var(--text-main); text-align: left;">Configurações da Conta</h3>
        
        <button onclick="window.resetGameProgress()" style="width: 100%; padding: 16px; background: rgba(217, 93, 85, 0.1); border: 1px solid #D95D55; color: #D95D55; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s;">
            <i class="fa-solid fa-trash-can"></i>
            Resetar Todo o Progresso
        </button>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin: 10px 0 0 0;">Atenção: Esta ação apagará todas as suas moedas, fases concluídas e ofensivas.</p>
    </div>

    <div style="color: var(--text-muted); font-size: 0.7rem;">
        <p>Jornada Bíblica v2.0</p>
    </div>
</div>
